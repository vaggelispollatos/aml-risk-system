apiVersion: apps/v1
kind: Deployment
metadata:
  name: aml-backend
  namespace: aml-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aml-backend
  template:
    metadata:
      labels:
        app: aml-backend
    spec:
      containers:
        - name: aml-backend
          image: aml-backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: aml-config
            - secretRef:
                name: aml-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
